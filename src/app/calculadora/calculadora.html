<div class="container">
    <div class="form-box">
        <h1>Calculadora</h1>
        <form #formulario="ngForm" (ngSubmit)="calcularResultado()" )>
            <div class="input-group">
                <label for="num1">Número 1:</label>
                <input type="number" id="num1" name="num1" [(ngModel)]="numero1" required>
            </div>
            <div class="input-group">
                <label for="num2">Número 2:</label>
                <input type="number" id="num2" name="num2" [(ngModel)]="numero2" required>
            </div>
            <button type="submit">Calcular</button>
        </form>
        @if (resultado) {
            <div class="result">
                Resultado: <span id="result">{{ resultado }}</span>
            </div>
        }
    </div>
</div>
